name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Run Benchmarks
      run: |
        cd MD5.Benchmark
        dotnet run -c Release -- --filter *Md5Comparison* --exporters github
    - name: Update README with Benchmarks
      run: |
        # Extract the benchmark table from the generated markdown file
        # The file is usually in MD5.Benchmark/BenchmarkDotNet.Artifacts/results/MD5.Benchmark.Md5VsSha256-report-github.md
        BENCH_FILE=$(find MD5.Benchmark/BenchmarkDotNet.Artifacts/results/ -name "*-report-github.md" | head -n 1)
        if [ -f "$BENCH_FILE" ]; then
          # Logic to update README.md
          python3 scripts/update_readme_benchmarks.py "$BENCH_FILE"
        fi
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        if git commit -m "Update benchmark results in README [skip ci]"; then
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
        else
          echo "No changes to commit"
        fi
